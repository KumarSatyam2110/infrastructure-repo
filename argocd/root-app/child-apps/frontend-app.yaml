apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: "https://github.com/KumarSatyam2110/infrastructure-repo.git"
    path: argocd/apps/frontend
    targetRevision: HEAD
  destination:
    server: "https://kubernetes.default.svc"
    namespace: frontend-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
